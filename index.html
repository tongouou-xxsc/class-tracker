<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="课外课记录">
<title>课外课记录</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f6f2;--surface:#fff;--surface2:#f0ede6;--border:#e8e4da;
  --text:#1a1915;--text2:#6b6760;--text3:#a09d97;
  --done-bg:#dff0df;--done-text:#1b5e20;
  --leave-bg:#fff3cd;--leave-text:#7a5000;
  --soon-bg:#f0ede6;--soon-text:#6b6760;
  --red:#c62828;--red-bg:#fde8e8;
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:50;}
.bnav-btn{flex:1;padding:10px 0 14px;border:none;background:none;cursor:pointer;font-size:11px;color:var(--text3);display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;}
.bnav-btn.on{color:var(--text);}
.bnav-icon{font-size:20px;}

.page{display:none;padding-bottom:80px;}
.page.on{display:block;}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px 12px;position:sticky;top:0;z-index:40;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.app-title{font-size:17px;font-weight:700;letter-spacing:-0.3px;}
.user-tag{font-size:11px;color:var(--text3);margin-top:2px;}
.month-nav{display:flex;align-items:center;gap:10px;}
.nav-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.nav-btn:active{background:var(--surface2);}
.month-label{font-size:14px;font-weight:500;min-width:72px;text-align:center;}
.subject-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.subject-tabs::-webkit-scrollbar{display:none;}
.stab{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--surface);cursor:pointer;white-space:nowrap;color:var(--text2);transition:all 0.15s;}

.main{padding:14px 16px;max-width:680px;margin:0 auto;}
.quota-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-bottom:14px;}
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 10px 8px;cursor:pointer;}
.qcard:active{border-color:var(--text3);}
.qcard-sub{font-size:10px;font-weight:500;margin-bottom:5px;}
.qcard-num{font-size:22px;font-weight:700;line-height:1;margin-bottom:3px;}
.qcard-num.warn{color:var(--red)!important;}
.qbar-bg{height:3px;border-radius:2px;background:var(--border);overflow:hidden;margin-bottom:4px;}
.qbar-fill{height:100%;border-radius:2px;}
.qcard-detail{font-size:10px;color:var(--text3);}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.scard{background:var(--surface);border-radius:var(--radius-sm);padding:10px 12px;border:1px solid var(--border);}
.scard-label{font-size:10px;color:var(--text3);margin-bottom:3px;}
.scard-num{font-size:22px;font-weight:700;}

.records-list{display:flex;flex-direction:column;gap:8px;}
.rec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:12px;}
.rec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.rec-main{flex:1;min-width:0;}
.rec-top{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.rec-sub{font-size:14px;font-weight:500;}
.rec-date{font-size:12px;color:var(--text3);}
.rec-note{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;flex-shrink:0;}
.badge.done{background:var(--done-bg);color:var(--done-text);}
.badge.leave{background:var(--leave-bg);color:var(--leave-text);}
.badge.soon{background:var(--soon-bg);color:var(--soon-text);}
.rec-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px;border-radius:6px;flex-shrink:0;line-height:1;}
.rec-del:active{background:var(--red-bg);color:var(--red);}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:13px;}
.loading{text-align:center;padding:2rem;color:var(--text3);font-size:13px;}

.fab{position:fixed;bottom:72px;right:20px;width:54px;height:54px;border-radius:50%;background:var(--text);color:#fff;font-size:26px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,0.18);z-index:40;}
.fab:active{transform:scale(0.95);}

/* Settings */
.settings-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px;position:sticky;top:0;z-index:40;font-size:17px;font-weight:700;}
.settings-main{padding:16px;max-width:680px;margin:0 auto;}
.settings-section{margin-bottom:24px;}
.settings-section-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:0.8px;margin-bottom:10px;}
.subject-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.subject-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.subject-info{flex:1;}
.subject-name{font-size:14px;font-weight:500;}
.subject-meta{font-size:12px;color:var(--text3);margin-top:1px;}
.subject-actions{display:flex;gap:6px;}
.icon-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;cursor:pointer;font-size:12px;color:var(--text2);font-family:inherit;}
.icon-btn:active{background:var(--surface2);}
.icon-btn.danger:active{background:var(--red-bg);color:var(--red);border-color:var(--red);}
.add-subject-btn{width:100%;padding:12px;border:1px dashed var(--border);border-radius:var(--radius-sm);background:none;cursor:pointer;font-size:13px;color:var(--text3);font-family:inherit;}
.add-subject-btn:active{background:var(--surface2);}

.color-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color 0.1s;}
.color-dot.on{border-color:var(--text);}

/* Overlays */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-end;justify-content:center;}
.overlay.show{display:flex;}
.sheet{background:var(--surface);width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:20px 20px 32px;animation:slideUp 0.2s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.sheet-title{font-size:16px;font-weight:700;margin-bottom:16px;}
.form-row{margin-bottom:14px;}
.form-row label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;}
.form-row input,.form-row select{width:100%;padding:10px 12px;font-size:14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:inherit;outline:none;}
.form-row input:focus,.form-row select:focus{border-color:var(--text3);}
.sheet-actions{display:flex;gap:10px;margin-top:18px;}
.btn-cancel{flex:1;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);font-size:14px;font-weight:500;cursor:pointer;color:var(--text2);font-family:inherit;}
.btn-save{flex:2;padding:12px;border:none;border-radius:var(--radius-sm);background:var(--text);font-size:14px;font-weight:500;cursor:pointer;color:#fff;font-family:inherit;}
.btn-save:active{opacity:0.85;}
.btn-cancel:active{background:var(--border);}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(26,25,21,0.88);color:#fff;padding:9px 20px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity 0.2s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="page on" id="page-home">
  <div class="header">
    <div class="header-top">
      <div><div class="app-title">课外课记录</div><div class="user-tag" id="userTag"></div></div>
      <div class="month-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <div class="month-label" id="monthLabel"></div>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
      </div>
    </div>
    <div class="subject-tabs" id="subjectTabs"></div>
  </div>
  <div class="main">
    <div class="quota-grid" id="quotaGrid"></div>
    <div class="stats-row">
      <div class="scard"><div class="scard-label">本月上课</div><div class="scard-num" id="sDone" style="color:#2e7d32">–</div></div>
      <div class="scard"><div class="scard-label">请假</div><div class="scard-num" id="sLeave" style="color:#7a5000">–</div></div>
      <div class="scard"><div class="scard-label">待上课</div><div class="scard-num" id="sSoon" style="color:var(--text3)">–</div></div>
    </div>
    <div id="recList"><div class="loading">加载中...</div></div>
  </div>
  <button class="fab" onclick="openAdd()">＋</button>
</div>

<div class="page" id="page-settings">
  <div class="settings-header">设置</div>
  <div class="settings-main">
    <div class="settings-section">
      <div class="settings-section-title">科目管理</div>
      <div id="subjectList"></div>
      <button class="add-subject-btn" onclick="openAddSubject()">＋ 添加新科目</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="bnav-btn on" id="nav-home" onclick="switchPage('home')"><span class="bnav-icon">📋</span>记录</button>
  <button class="bnav-btn" id="nav-settings" onclick="switchPage('settings')"><span class="bnav-icon">⚙️</span>设置</button>
</nav>

<!-- Add record -->
<div class="overlay" id="addOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">添加上课记录</div>
    <div class="form-row"><label>日期</label><input type="date" id="fDate"></div>
    <div class="form-row"><label>科目</label><select id="fSub"></select></div>
    <div class="form-row"><label>状态</label>
      <select id="fStatus"><option value="已完成">已完成</option><option value="请假">请假</option><option value="待上课">待上课</option></select>
    </div>
    <div class="form-row"><label>备注（可选）</label><input type="text" id="fNote" placeholder="如：手型练习、换气练习…"></div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeAdd()">取消</button>
      <button class="btn-save" onclick="saveAdd()" id="saveBtn">保存</button>
    </div>
  </div>
</div>

<!-- Quota edit -->
<div class="overlay" id="quotaOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="quotaTitle">修改课时包</div>
    <div class="form-row"><label>课时包总课时数</label><input type="number" id="qTotal" min="1" max="999" step="1"></div>
    <div class="form-row"><label>手动调整已用课时</label><input type="number" id="qExtra" min="0" step="1"></div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeQuota()">取消</button>
      <button class="btn-save" onclick="saveQuota()">保存</button>
    </div>
  </div>
</div>

<!-- Add/edit subject -->
<div class="overlay" id="subjectOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="subjectSheetTitle">添加科目</div>
    <div class="form-row"><label>科目名称</label><input type="text" id="sName" placeholder="如：围棋、英语…" maxlength="10"></div>
    <div class="form-row"><label>图标（emoji）</label><input type="text" id="sEmoji" placeholder="如：♟ 🎸 🧮" maxlength="4"></div>
    <div class="form-row"><label>颜色</label><div class="color-grid" id="colorGrid"></div></div>
    <div class="form-row"><label>课时包总数</label><input type="number" id="sTotal" min="1" max="999" step="1" value="20"></div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeSubject()">取消</button>
      <button class="btn-save" onclick="saveSubject()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxeO55loC7K9aBIUz1rYhuXeoMHiDSIDwEufPx77362l7ITCAu1kTxPq0ke6IKOrN42NQ/exec';
const DAYS = ['周日','周一','周二','周三','周四','周五','周六'];
const MNAMES = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const PALETTE = ['#2563a8','#6d4fc4','#2e7d32','#0e7c61','#b05c1a','#c62828','#c2185b','#00838f','#558b2f','#6d4c41','#1565c0','#4527a0'];

const USER = new URLSearchParams(window.location.search).get('user') || 'default';
const S_KEY = 'subjects_' + USER;
const Q_KEY = 'quotas_'   + USER;

const DEFAULT_SUBJECTS = [
  {name:'钢琴',   emoji:'🎹', color:'#2563a8', total:20},
  {name:'国际象棋', emoji:'♟',  color:'#6d4fc4', total:24},
  {name:'数学',   emoji:'📐', color:'#2e7d32', total:16},
  {name:'游泳',   emoji:'🏊', color:'#0e7c61', total:20},
  {name:'围棋',   emoji:'⚫', color:'#b05c1a', total:20},
];

let subjects = JSON.parse(localStorage.getItem(S_KEY) || 'null') || DEFAULT_SUBJECTS;
let quotas   = JSON.parse(localStorage.getItem(Q_KEY) || '{}');
subjects.forEach(s => { if (!quotas[s.name]) quotas[s.name] = {total:s.total, extra:0}; });

let allRecords = [];
let cy = new Date().getFullYear(), cm = new Date().getMonth()+1;
let filter = 'all', editSub = null, editSubjectIdx = null, selectedColor = PALETTE[0];

function saveSubjects(){ localStorage.setItem(S_KEY, JSON.stringify(subjects)); }
function saveQuotas(){   localStorage.setItem(Q_KEY, JSON.stringify(quotas)); }

// API
function apiFetch(params){ return fetch(API+'?'+new URLSearchParams(params),{method:'GET',redirect:'follow',mode:'cors'}).then(r=>r.json()); }
function apiJsonp(params){
  return new Promise((res,rej)=>{
    const cb='cb_'+Date.now(), s=document.createElement('script');
    const t=setTimeout(()=>{rej(new Error('timeout'));s.remove();delete window[cb];},10000);
    window[cb]=d=>{clearTimeout(t);res(d);s.remove();delete window[cb];};
    s.onerror=()=>{clearTimeout(t);rej(new Error('err'));delete window[cb];};
    s.src=API+'?'+new URLSearchParams({...params,callback:cb});
    document.head.appendChild(s);
  });
}
async function apiCall(p){ try{return await apiFetch(p);}catch(e){return await apiJsonp(p);} }

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

// Nav
function switchPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+name).classList.add('on');
  document.getElementById('nav-'+name).classList.add('on');
  if(name==='settings') renderSettings();
}

// Home
function changeMonth(d){ cm+=d; if(cm>12){cm=1;cy++;} if(cm<1){cm=12;cy--;} render(); }

function renderTabs(){
  document.getElementById('subjectTabs').innerHTML =
    `<button class="stab" style="${filter==='all'?'background:var(--text);border-color:transparent;color:#fff':''}" onclick="setFilter('all')">全部</button>` +
    subjects.map(s=>`<button class="stab" style="${filter===s.name?`background:${s.color};border-color:transparent;color:#fff`:''}" onclick="setFilter('${s.name}')">${s.emoji} ${s.name}</button>`).join('');
}

function setFilter(f){ filter=f; renderTabs(); renderList(); }

function monthRecs(){ return allRecords.filter(r=>{ const d=new Date(r.date); return d.getFullYear()===cy&&d.getMonth()+1===cm; }); }
function usedAll(name){ return allRecords.filter(r=>r.subject===name&&r.status==='已完成').length; }

function renderQuotas(){
  document.getElementById('quotaGrid').innerHTML = subjects.map(s=>{
    const q=quotas[s.name]||{total:s.total,extra:0};
    const used=usedAll(s.name)+(q.extra||0);
    const r=Math.max(0,q.total-used);
    const pct=q.total>0?Math.min(100,Math.round(used/q.total*100)):0;
    const warn=r<=3;
    return `<div class="qcard" onclick="openQuota('${s.name}')">
      <div class="qcard-sub" style="color:${s.color}">${s.name}</div>
      <div class="qcard-num${warn?' warn':''}" style="${warn?'':'color:'+s.color}">${r}</div>
      <div class="qbar-bg"><div class="qbar-fill" style="width:${pct}%;background:${s.color}"></div></div>
      <div class="qcard-detail">剩余课时${warn?' ⚠':''}</div>
    </div>`;
  }).join('');
}

function renderList(){
  const mr=monthRecs();
  document.getElementById('sDone').textContent  = mr.filter(r=>r.status==='已完成').length;
  document.getElementById('sLeave').textContent = mr.filter(r=>r.status==='请假').length;
  document.getElementById('sSoon').textContent  = mr.filter(r=>r.status==='待上课').length;
  const shown=(filter==='all'?mr:mr.filter(r=>r.subject===filter)).sort((a,b)=>b.date.localeCompare(a.date));
  const list=document.getElementById('recList');
  if(!shown.length){list.innerHTML='<div class="empty">本月暂无记录</div>';return;}
  const sc={'已完成':'done','请假':'leave','待上课':'soon'};
  const col=name=>{const s=subjects.find(x=>x.name===name);return s?s.color:'#999';};
  list.innerHTML='<div class="records-list">'+shown.map(r=>{
    const d=new Date(r.date);
    const ds=(d.getMonth()+1)+'月'+d.getDate()+'日 '+DAYS[d.getDay()];
    return `<div class="rec-card">
      <div class="rec-dot" style="background:${col(r.subject)}"></div>
      <div class="rec-main">
        <div class="rec-top"><span class="rec-sub">${r.subject}</span><span class="rec-date">${ds}</span></div>
        <div class="rec-note">${r.note||'—'}</div>
      </div>
      <span class="badge ${sc[r.status]||'soon'}">${r.status}</span>
      <button class="rec-del" onclick="delRec('${r.id}')">×</button>
    </div>`;
  }).join('')+'</div>';
}

function render(){
  document.getElementById('monthLabel').textContent=cy+'年'+MNAMES[cm-1];
  renderTabs(); renderQuotas(); renderList();
}

async function loadAll(){
  document.getElementById('recList').innerHTML='<div class="loading">加载中...</div>';
  try{
    const res=await apiCall({action:'getAll',user:USER});
    allRecords=(res.records||[]).filter(r=>r.id&&r.date&&r.subject);
    render();
  }catch(e){
    document.getElementById('recList').innerHTML='<div class="empty">加载失败 — 请确认 Apps Script 已部署</div>';
  }
}

// Add record
function openAdd(){
  const pad=n=>String(n).padStart(2,'0');
  document.getElementById('fDate').value=`${cy}-${pad(cm)}-${pad(new Date().getDate())}`;
  document.getElementById('fNote').value='';
  document.getElementById('fSub').innerHTML=subjects.map(s=>`<option value="${s.name}">${s.emoji} ${s.name}</option>`).join('');
  document.getElementById('addOverlay').classList.add('show');
}
function closeAdd(){ document.getElementById('addOverlay').classList.remove('show'); }

async function saveAdd(){
  const date=document.getElementById('fDate').value;
  if(!date){showToast('请选择日期');return;}
  const btn=document.getElementById('saveBtn');
  btn.textContent='保存中…';btn.disabled=true;
  try{
    const sub=document.getElementById('fSub').value;
    const status=document.getElementById('fStatus').value;
    const note=document.getElementById('fNote').value;
    const res=await apiCall({action:'add',date,user:USER,subject:sub,status,note});
    if(res.ok){ allRecords.push({id:String(res.id),date,subject:sub,status,note}); closeAdd();render();showToast('已添加'); }
  }catch(e){showToast('保存失败，请重试');}
  btn.textContent='保存';btn.disabled=false;
}

async function delRec(id){
  if(!confirm('确认删除这条记录？'))return;
  try{ await apiCall({action:'delete',id,user:USER}); allRecords=allRecords.filter(r=>String(r.id)!==String(id)); render();showToast('已删除'); }
  catch(e){showToast('删除失败');}
}

// Quota
function openQuota(name){
  editSub=name;
  const q=quotas[name]||{total:20,extra:0};
  document.getElementById('quotaTitle').textContent='修改课时包 — '+name;
  document.getElementById('qTotal').value=q.total;
  document.getElementById('qExtra').value=q.extra||0;
  document.getElementById('quotaOverlay').classList.add('show');
}
function closeQuota(){ document.getElementById('quotaOverlay').classList.remove('show');editSub=null; }
function saveQuota(){
  if(!editSub)return;
  quotas[editSub]={total:parseInt(document.getElementById('qTotal').value)||0,extra:parseInt(document.getElementById('qExtra').value)||0};
  saveQuotas();closeQuota();renderQuotas();showToast('已保存');
}

// Settings
function renderSettings(){
  document.getElementById('subjectList').innerHTML=subjects.map((s,i)=>`
    <div class="subject-item">
      <div class="subject-dot" style="background:${s.color}"></div>
      <div class="subject-info">
        <div class="subject-name">${s.emoji} ${s.name}</div>
        <div class="subject-meta">课时包 ${(quotas[s.name]||{}).total||s.total} 节 · 已上 ${usedAll(s.name)} 节</div>
      </div>
      <div class="subject-actions">
        <button class="icon-btn" onclick="openEditSubject(${i})">编辑</button>
        <button class="icon-btn danger" onclick="deleteSubject(${i})">删除</button>
      </div>
    </div>`).join('');
}

function renderColorGrid(sel){
  document.getElementById('colorGrid').innerHTML=PALETTE.map(c=>`<div class="color-dot${c===sel?' on':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`).join('');
}
function pickColor(c){ selectedColor=c; renderColorGrid(c); }

function openAddSubject(){
  editSubjectIdx=null; selectedColor=PALETTE[0];
  document.getElementById('subjectSheetTitle').textContent='添加科目';
  document.getElementById('sName').value='';
  document.getElementById('sEmoji').value='';
  document.getElementById('sTotal').value=20;
  renderColorGrid(selectedColor);
  document.getElementById('subjectOverlay').classList.add('show');
}

function openEditSubject(i){
  editSubjectIdx=i; const s=subjects[i]; selectedColor=s.color;
  document.getElementById('subjectSheetTitle').textContent='编辑科目';
  document.getElementById('sName').value=s.name;
  document.getElementById('sEmoji').value=s.emoji;
  document.getElementById('sTotal').value=(quotas[s.name]||{}).total||s.total;
  renderColorGrid(selectedColor);
  document.getElementById('subjectOverlay').classList.add('show');
}

function closeSubject(){ document.getElementById('subjectOverlay').classList.remove('show');editSubjectIdx=null; }

function saveSubject(){
  const name=document.getElementById('sName').value.trim();
  const emoji=document.getElementById('sEmoji').value.trim()||'📚';
  const total=parseInt(document.getElementById('sTotal').value)||20;
  if(!name){showToast('请输入科目名称');return;}
  if(editSubjectIdx!==null){
    const old=subjects[editSubjectIdx].name;
    subjects[editSubjectIdx]={name,emoji,color:selectedColor,total};
    if(old!==name){ quotas[name]=quotas[old]||{total,extra:0}; delete quotas[old]; }
    else{ quotas[name]={...(quotas[name]||{}),total}; }
  } else {
    if(subjects.find(s=>s.name===name)){showToast('科目名称已存在');return;}
    subjects.push({name,emoji,color:selectedColor,total});
    quotas[name]={total,extra:0};
  }
  saveSubjects();saveQuotas();
  closeSubject();renderSettings();render();showToast('已保存');
}

function deleteSubject(i){
  const s=subjects[i];
  const used=allRecords.filter(r=>r.subject===s.name).length;
  const msg=used>0?`「${s.name}」已有 ${used} 条记录，删除科目不影响历史记录，确认删除？`:`确认删除「${s.name}」？`;
  if(!confirm(msg))return;
  subjects.splice(i,1); saveSubjects(); renderSettings(); render(); showToast('已删除');
}

['addOverlay','quotaOverlay','subjectOverlay'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('show');});
});

if(USER!=='default') document.getElementById('userTag').textContent='👤 '+USER;
loadAll();
</script>
</body>
</html>
